name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  verify_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          expected_tag="v$version"
          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $version"
            exit 1
          fi

      - name: Validate tag ancestry
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "Tagged commit $SHA is not reachable from origin/main"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm check

      - name: Build demo under Pages base path
        run: PAGES_BASE_PATH=/mdian pnpm demo:build

  publish_npm:
    needs: verify_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Confirm npm version is still unpublished
        id: npm_guard
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          if npm view mdian@"$version" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_guard.outputs.already_published != 'true'
        run: npm publish --access public

  github_release:
    needs:
      - verify_release
      - publish_npm
    if: needs.publish_npm.result == 'success' || needs.publish_npm.result == 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
