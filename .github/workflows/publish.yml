name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve_release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      release_source: ${{ steps.resolve.outputs.release_source }}
      npm_published: ${{ steps.resolve.outputs.npm_published }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
      tag_matches_target: ${{ steps.resolve.outputs.tag_matches_target }}
      tag_target: ${{ steps.resolve.outputs.tag_target }}
      github_release_exists: ${{ steps.resolve.outputs.github_release_exists }}
      should_publish_npm: ${{ steps.resolve.outputs.should_publish_npm }}
      should_create_tag: ${{ steps.resolve.outputs.should_create_tag }}
      should_create_github_release: ${{ steps.resolve.outputs.should_create_github_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release state
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/release/resolve-release.mjs

  verify_release:
    needs: resolve_release
    if: needs.resolve_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm check

      - name: Build demo under Pages base path
        run: PAGES_BASE_PATH=/mdian pnpm demo:build

  publish_npm:
    needs:
      - resolve_release
      - verify_release
    if: needs.resolve_release.outputs.should_publish_npm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Confirm npm version is still unpublished
        id: npm_guard
        env:
          VERSION: ${{ needs.resolve_release.outputs.version }}
        run: |
          if npm view mdian@"$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_guard.outputs.already_published != 'true'
        run: npm publish --access public

  github_release:
    needs:
      - resolve_release
      - verify_release
      - publish_npm
    if: >-
      needs.resolve_release.outputs.should_release == 'true' &&
      (needs.resolve_release.outputs.should_create_tag == 'true' || needs.resolve_release.outputs.should_create_github_release == 'true') &&
      (needs.publish_npm.result == 'success' || needs.publish_npm.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inspect current tag target
        id: tag_guard
        if: needs.resolve_release.outputs.should_create_tag == 'true'
        env:
          TAG: ${{ needs.resolve_release.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          git fetch --tags origin
          target=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
          if [ -n "$target" ] && [ "$target" != "$SHA" ]; then
            echo "Tag $TAG already exists at $target instead of $SHA"
            exit 1
          fi
          if [ -n "$target" ]; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag
        if: needs.resolve_release.outputs.should_create_tag == 'true' && steps.tag_guard.outputs.already_exists != 'true'
        env:
          TAG: ${{ needs.resolve_release.outputs.tag }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: needs.resolve_release.outputs.should_create_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_release.outputs.tag }}
          generate_release_notes: true
